<div class="main" [formGroup]="filterForm">
  <h3 class="header">List of CLients</h3>
  <p-table
    [value]="clients()"
    [lazy]="true"
    (onLazyLoad)="loadDataLazy($event)"
    [paginator]="true"
    [rows]="10"
    [totalRecords]="totalRecords()"
    [rowsPerPageOptions]="[10, 20, 50]"
    [loading]="loading()"
    responsiveLayout="scroll"
    [scrollable]="true"
    scrollHeight="90vh"
    showGridlines
    [tableStyle]="{ 'min-width': '60rem' }"
  >
    <!-- 🔍 FILTER HEADER -->
    <ng-template pTemplate="header">
      <tr>
        <th>
          First Name
          <input pInputText type="text" formControlName="firstName" class="w-full" />
        </th>

        <th>
          Last Name
          <input pInputText type="text" formControlName="lastName" class="w-full" />
        </th>

        <th>
          Phone
          <input pInputText type="text" formControlName="phoneNumber" class="w-full" />
        </th>

        <th>
          Shipping From
          <p-select
            formControlName="shippingFrom"
            [options]="shippingOptions"
            [editable]="true"
            [showClear]="true"
            placeholder="Select or type"
            class="w-full"
          ></p-select>
        </th>

        <th>
          Shipping To
          <p-select
            formControlName="shippingTo"
            [options]="shippingOptions"
            [editable]="true"
            [showClear]="true"
            placeholder="Select or type"
            class="w-full"
          ></p-select>
        </th>

        <th>
          Comment
          <input pInputText type="text" formControlName="comment" class="w-full" />
        </th>
      </tr>
    </ng-template>

    <!-- 📊 BODY -->
    <ng-template pTemplate="body" let-client>
      <tr>
        <td>{{ client.firstName }}</td>
        <td>{{ client.lastName }}</td>
        <td>{{ client.phonenumber }}</td>
        <td>{{ client.shippingFrom }}</td>
        <td>{{ client.shippingTo }}</td>
        <td>{{ client.comment }}</td>
      </tr>
    </ng-template>
  </p-table>
</div>
